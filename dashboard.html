<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤖</text></svg>">
    <title>UchilaBot - Pro Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #04060D; color: #f3f4f6; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; letter-spacing: -0.2px; }
        .bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 0% 0%, rgba(255, 68, 79, 0.12), transparent 40%), radial-gradient(circle at 100% 100%, rgba(59, 130, 246, 0.06), transparent 40%), #04060D; z-index: -1; }
        header { height: 80px; background: rgba(10, 13, 26, 0.7); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.04); display: flex; justify-content: space-between; align-items: center; padding: 0 40px; }
        .logo h2 { font-size: 22px; font-weight: 800; letter-spacing: 2px; }
        .logo .uchila { color: #ffffff; }
        .logo .deriv { color: #ff444f; text-shadow: 0 0 20px rgba(255,68,79,0.25); }
        .header-right { display: flex; align-items: center; gap: 24px; }
        .server-status { display: flex; align-items: center; gap: 10px; font-size: 13px; color: #9ca3af; font-weight: 500; }
        .status-dot { width: 8px; height: 8px; background: #ef4444; border-radius: 50%; transition: 0.3s; }
        .user-info { display: flex; align-items: center; gap: 14px; background: rgba(255, 255, 255, 0.02); padding: 10px 18px; border-radius: 14px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .user-info i { color: #ff444f; font-size: 14px; }
        .account-name { font-size: 13px; color: #9ca3af; font-weight: 500; }
        .container { flex: 1; display: flex; gap: 30px; padding: 40px; max-width: 1700px; margin: 0 auto; width: 100%; }
        .panel-config { width: 410px; flex-shrink: 0; background: rgba(13, 17, 33, 0.65); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 24px; padding: 30px 25px; display: flex; flex-direction: column; gap: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); height: fit-content; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-group label { font-size: 11px; color: #9ca3af; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }
        .input-wrapper { position: relative; }
        .input-wrapper select, .input-wrapper input { width: 100%; height: 54px; background: #070914; border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 14px; color: #ffffff; padding: 0 16px 0 48px; outline: none; font-size: 14px; font-weight: 500; }
        .input-wrapper i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: #ff444f; font-size: 15px; }
        .actions { display: flex; flex-direction: column; gap: 12px; margin-top: 10px; }
        .btn { height: 54px; border: none; border-radius: 14px; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; display: flex; justify-content: center; align-items: center; gap: 10px; width: 100%; }
        .btn-start { background: linear-gradient(135deg, #10b981, #059669); color: #fff; }
        .btn-start:hover { transform: translateY(-1px); box-shadow: 0 10px 25px rgba(16,185,129,0.25); }
        .btn-stop { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }
        .btn-stop:hover { background: #ef4444; color: #fff; }
        .main-content { flex: 1; display: flex; flex-direction: column; gap: 30px; min-width: 0; }
        .status-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .status-card { background: rgba(13, 17, 33, 0.5); border: 1px solid rgba(255, 255, 255, 0.03); border-radius: 20px; padding: 20px 15px; display: flex; justify-content: space-between; align-items: center; }
        .status-card-info { display: flex; flex-direction: column; gap: 6px; }
        .status-card-info span { font-size: 12px; color: #9ca3af; font-weight: 500; }
        .status-card-info h3 { font-size: 22px; font-weight: 700; }
        .status-card i { font-size: 20px; opacity: 0.2; color: #9ca3af; }
        .table-container { background: rgba(13, 17, 33, 0.65); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 24px; padding: 30px; flex: 1; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        .table-header { border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 18px; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 13px; }
        th { color: #9ca3af; font-weight: 600; padding: 14px 8px; font-size: 11px; text-transform: uppercase; }
        td { padding: 14px 8px; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; }
        .badge-win { background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.2); }
        .badge-loss { background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }
    </style>
</head>
<body>
    <div class="bg"></div>
    <header>
        <div class="logo"><h2><span class="uchila">UCHILA</span><span class="deriv">BOT</span></h2></div>
        <div class="header-right">
            <div class="server-status">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">A conectar...</span>
            </div>
            <div class="user-info">
                <i class="fa-solid fa-user-shield"></i>
                <span class="account-name" id="user-email">A validar sessão...</span>
            </div>
        </div>
    </header>

    <div class="container">
        <aside class="panel-config">
            <div class="input-group">
                <label>Estratégia Protegida Uchila</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-robot"></i>
                    <select id="estrategia-select">
                        <option value="UCHILA_GUARD">Uchila Guard (DigitOver 0)</option>
                    </select>
                </div>
            </div>
            <div class="input-group">
                <label>Aposta Inicial (Stake)</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-dollar-sign"></i>
                    <input type="number" id="stake-input" value="0.35" step="0.05" min="0.35">
                </div>
            </div>
            <div class="actions">
                <button class="btn btn-start" id="btnStartBot"><i class="fa-solid fa-play"></i> Ligar Robô no Servidor</button>
                <button class="btn btn-stop" id="btnStopBot"><i class="fa-solid fa-stop"></i> Desligar Robô</button>
            </div>
        </aside>

        <main class="main-content">
            <div class="status-grid">
                <div class="status-card">
                    <div class="status-card-info"><span>Último Dígito</span><h3 id="digito-display" style="color: #3b82f6;">-</h3></div>
                    <i class="fa-solid fa-fingerprint"></i>
                </div>
                <div class="status-card">
                    <div class="status-card-info"><span>Estado do Bot</span><h3 id="bot-status" style="font-size:16px;">Inativo</h3></div>
                    <i class="fa-solid fa-microchip"></i>
                </div>
                <div class="status-card">
                    <div class="status-card-info"><span>Preço Atual</span><h3 id="preco-display">$0.00</h3></div>
                    <i class="fa-solid fa-chart-line"></i>
                </div>
                <div class="status-card">
                    <div class="status-card-info"><span>Ligação</span><h3 style="font-size:15px; color:#10b981;">Protegida (Proxy)</h3></div>
                    <i class="fa-solid fa-vault"></i>
                </div>
            </div>

            <div class="table-container">
                <div class="table-header"><h3>Histórico de Operações (Backend Logs)</h3></div>
                <table>
                    <thead><tr><th>Mensagem do Servidor</th><th>Contrato</th><th>Resultado</th></tr></thead>
                    <tbody id="log-table">
                        <tr id="no-data-row"><td colspan="3" style="text-align:center; color:#6b7280; padding:30px;">O robô encontra-se desligado neste momento.</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
                  </html>
