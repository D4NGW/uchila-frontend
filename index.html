<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤖</text></svg>">
    <title>UchilaBot - Autenticação Segura</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
        body { background:#04060D; color:#f3f4f6; min-height:100vh; display:flex; justify-content:center; align-items:center; overflow:hidden; }
        .bg { position:fixed; inset:0; background:radial-gradient(circle at 50% 40%, rgba(255,68,79,0.12), transparent 50%), #04060D; z-index:-1; }

        .login-card {
            background:rgba(13,17,33,0.5);
            backdrop-filter:blur(20px);
            border:1px solid rgba(255,255,255,0.06);
            border-radius:28px;
            padding:50px 40px;
            width:100%;
            max-width:440px;
            text-align:center;
        }

        .logo-container h1 { font-size:32px; font-weight:800; }
        .uchila { color:#fff; }
        .deriv { color:#ff444f; }

        .btn-oauth {
            height:58px;
            width:100%;
            background:linear-gradient(135deg,#ff444f,#de2c37);
            border:none;
            border-radius:16px;
            color:#fff;
            font-size:16px;
            font-weight:700;
            cursor:pointer;
            display:flex;
            align-items:center;
            justify-content:center;
            gap:12px;
        }
    </style>
</head>

<body>
<div class="bg"></div>

<div class="login-card">
    <div class="logo-container">
        <h1><span class="uchila">UCHILA</span><span class="deriv">BOT</span></h1>
    </div>

    <p style="color:#9ca3af;margin:20px 0 30px;">
        Autenticação segura via Deriv OAuth2 + PKCE
    </p>

    <button class="btn-oauth" onclick="conectarComDeriv()">
        Entrar com Deriv <i class="fa-solid fa-shield-halved"></i>
    </button>
</div>

<script>
const CLIENT_ID = "33nZb90yOHPIJXVFbYG39";
const REDIRECT_URI = "https://uchilabotprov9.vercel.app/dashboard.html";

async function gerarChallenge(verifier) {
    const hash = await crypto.subtle.digest(
        "SHA-256",
        new TextEncoder().encode(verifier)
    );

    return btoa(String.fromCharCode(...new Uint8Array(hash)))
        .replace(/\+/g,'-')
        .replace(/\//g,'_')
        .replace(/=+$/,'');
}

async function conectarComDeriv() {

    const bytes = crypto.getRandomValues(new Uint8Array(32));

    const codeVerifier = Array.from(bytes)
        .map(b => b.toString(16).padStart(2,'0'))
        .join('');

    const codeChallenge = await gerarChallenge(codeVerifier);

    const state = crypto.getRandomValues(new Uint8Array(16))
        .reduce((s,b)=>s + b.toString(16).padStart(2,'0'),'');

    sessionStorage.setItem("pkce_verifier", codeVerifier);
    sessionStorage.setItem("oauth_state", state);

    const url =
        "https://auth.deriv.com/oauth2/auth?" +
        "response_type=code" +
        "&client_id=" + CLIENT_ID +
        "&redirect_uri=" + encodeURIComponent(REDIRECT_URI) +
        "&scope=trade+account_manage" +
        "&state=" + state +
        "&code_challenge=" + codeChallenge +
        "&code_challenge_method=S256";

    window.location.href = url;
}
</script>
</body>
</html>
